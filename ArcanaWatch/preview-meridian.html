<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian — Watch Face Preview</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  canvas { border-radius:55px; box-shadow:0 0 40px rgba(0,0,0,0.8); }
</style>
</head>
<body>
<canvas id="w" width="396" height="484"></canvas>
<script>
// World-time / dual-time dress watch — inspired by Vacheron Overseas / Calatrava Travel Time
const c=document.getElementById('w');
const ctx=c.getContext('2d');
const W=396,H=484,CX=W/2,CY=H/2;

function clip(){ctx.save();ctx.beginPath();ctx.roundRect(0,0,W,H,55);ctx.clip();}

function drawBG(){
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#1a1a2a'); g.addColorStop(1,'#0e0e1a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // Platinum case
  const cg=ctx.createLinearGradient(CX-192,CY-192,CX+192,CY+192);
  cg.addColorStop(0,'#d0d0d8'); cg.addColorStop(0.3,'#909098');
  cg.addColorStop(0.6,'#c0c0c8'); cg.addColorStop(1,'#a0a0a8');
  ctx.beginPath(); ctx.arc(CX,CY,192,0,Math.PI*2);
  ctx.fillStyle=cg; ctx.fill();
}

function drawDial(){
  // Navy blue dial
  const g=ctx.createRadialGradient(CX-30,CY-40,10,CX,CY,182);
  g.addColorStop(0,'#1e2848'); g.addColorStop(0.7,'#141e38'); g.addColorStop(1,'#0e1628');
  ctx.beginPath(); ctx.arc(CX,CY,182,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(180,190,220,0.2)'; ctx.lineWidth=1; ctx.stroke();
}

function drawCrosshairs(){
  // Subtle meridian lines — give the dual-world-time feel
  ctx.strokeStyle='rgba(180,190,230,0.06)'; ctx.lineWidth=0.8;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(CX,CY-182); ctx.lineTo(CX,CY+182); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX-182,CY); ctx.lineTo(CX+182,CY); ctx.stroke();
  ctx.setLineDash([]);
}

function drawDualTimeZone(localH,localM,s){
  // Second time zone display at bottom — 4h ahead (e.g. London/Dubai offset)
  const offset=4;
  const tz2H=(localH+offset)%24;
  const tz2M=localM;
  const label=`+${offset}h`;
  const by=CY+108,bw=120,bh=28;
  ctx.fillStyle='rgba(200,210,240,0.06)';
  ctx.fillRect(CX-bw/2,by-bh/2,bw,bh);
  ctx.strokeStyle='rgba(180,190,230,0.15)'; ctx.lineWidth=0.8;
  ctx.strokeRect(CX-bw/2,by-bh/2,bw,bh);
  ctx.font=`${W*0.022}px 'Courier New'`;
  ctx.fillStyle='rgba(180,195,235,0.45)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label,CX-40,by);
  ctx.font=`${W*0.038}px 'Courier New'`;
  ctx.fillStyle='rgba(200,215,255,0.55)';
  const disp=`${String(tz2H).padStart(2,'0')}:${String(tz2M).padStart(2,'0')}`;
  ctx.fillText(disp,CX+22,by);
}

function drawWorldTimeRing(){
  // Outer 24-city ring (simplified)
  const cities=['LON','PAR','DXB','BOM','SGP','TKY','SYD','NOU','LAX','NYC','GRU','MAD'];
  const R=168;
  for(let i=0;i<12;i++){
    const a=(i*30-90)*Math.PI/180;
    ctx.font=`${W*0.02}px 'Courier New'`;
    ctx.fillStyle='rgba(180,200,240,0.25)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(cities[i],CX+Math.cos(a)*(R-8),CY+Math.sin(a)*(R-8));
  }
}

function drawIndices(){
  const R=148;
  for(let i=0;i<12;i++){
    const a=(i*30-90)*Math.PI/180;
    ctx.save();
    ctx.translate(CX+Math.cos(a)*(R-10),CY+Math.sin(a)*(R-10));
    ctx.rotate(a+Math.PI/2);
    if(i===0){
      // Diamond at 12
      ctx.fillStyle='rgba(220,225,255,0.9)';
      ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-5,0); ctx.lineTo(0,10); ctx.lineTo(5,0); ctx.closePath();
      ctx.fill();
    } else {
      const g=ctx.createLinearGradient(-3,0,3,0);
      g.addColorStop(0,'rgba(140,150,200,0.5)');
      g.addColorStop(0.5,'rgba(200,210,255,0.8)');
      g.addColorStop(1,'rgba(140,150,200,0.5)');
      ctx.fillStyle=g;
      ctx.fillRect(-3,i%3===0?-16:-10,6,i%3===0?32:20);
    }
    ctx.restore();
  }
  for(let i=0;i<60;i++){
    if(i%5===0) continue;
    const a=(i*6-90)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(CX+Math.cos(a)*R,CY+Math.sin(a)*R);
    ctx.lineTo(CX+Math.cos(a)*(R-5),CY+Math.sin(a)*(R-5));
    ctx.strokeStyle='rgba(180,190,230,0.2)'; ctx.lineWidth=0.8; ctx.stroke();
  }
}

function drawDate(day){
  const dx=CX+88,dy=CY,dw=36,dh=22;
  ctx.fillStyle='rgba(200,210,250,0.9)';
  ctx.fillRect(dx-dw/2,dy-dh/2,dw,dh);
  ctx.strokeStyle='rgba(120,130,180,0.5)'; ctx.lineWidth=0.8;
  ctx.strokeRect(dx-dw/2,dy-dh/2,dw,dh);
  ctx.fillStyle='#111830';
  ctx.font=`bold ${W*0.04}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(String(day),dx,dy+1);
}

function drawBrand(){
  ctx.fillStyle='rgba(200,210,255,0.5)';
  ctx.font=`${W*0.04}px Georgia`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('MERIDIAN',CX,CY-50);
  ctx.font=`${W*0.02}px Georgia`;
  ctx.fillStyle='rgba(180,190,240,0.3)';
  ctx.fillText('DUAL TIME · AUTOMATIC',CX,CY-34);
}

function drawHand(angle,len,w,bright){
  ctx.save(); ctx.translate(CX,CY); ctx.rotate(angle);
  const g=ctx.createLinearGradient(-w/2,0,w/2,0);
  const c1=bright?'rgba(200,210,255,0.9)':'rgba(120,130,180,0.7)';
  const c2=bright?'rgba(230,235,255,1)':'rgba(160,170,220,0.8)';
  g.addColorStop(0,c1); g.addColorStop(0.5,c2); g.addColorStop(1,c1);
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(-w/2,12); ctx.lineTo(-w/2,0);
  ctx.lineTo(-w/6,-len*0.6); ctx.lineTo(0,-len);
  ctx.lineTo(w/6,-len*0.6); ctx.lineTo(w/2,0);
  ctx.lineTo(w/2,12); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='rgba(0,0,30,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.restore();
}

function drawSeconds(angle){
  ctx.save(); ctx.translate(CX,CY); ctx.rotate(angle);
  ctx.beginPath(); ctx.moveTo(0,20); ctx.lineTo(0,-148);
  ctx.strokeStyle='rgba(100,160,255,0.8)'; ctx.lineWidth=1.5; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2);
  ctx.fillStyle='rgba(100,160,255,0.9)'; ctx.fill();
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  clip();
  const now=new Date();
  const h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds(),ms=now.getMilliseconds();
  drawBG(); drawDial(); drawCrosshairs(); drawWorldTimeRing(); drawIndices();
  drawDate(now.getDate()); drawBrand();
  drawDualTimeZone(h,m,s);

  const ha=((h+m/60)*30-90)*Math.PI/180;
  const ma=((m+s/60)*6-90)*Math.PI/180;
  const sa=((s+ms/1000)*6-90)*Math.PI/180;

  ctx.shadowColor='rgba(100,120,255,0.3)'; ctx.shadowBlur=10;
  drawHand(ha,88,12,true);
  drawHand(ma,130,9,true);
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;
  drawSeconds(sa);

  const cg=ctx.createRadialGradient(CX,CY,0,CX,CY,6);
  cg.addColorStop(0,'#e0e8ff'); cg.addColorStop(1,'#4050a0');
  ctx.beginPath(); ctx.arc(CX,CY,6,0,Math.PI*2);
  ctx.fillStyle=cg; ctx.fill();

  ctx.restore();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>

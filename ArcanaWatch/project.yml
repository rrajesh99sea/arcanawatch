name: ArcanaWatch
options:
  bundleIdPrefix: com.arcana
  deploymentTarget:
    watchOS: "11.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

targets:
  ArcanaWatch:
    type: application
    platform: watchOS
    sources:
      - path: ArcanaWatch
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arcana.watchface
        PRODUCT_NAME: ArcanaWatch
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: ArcanaWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: ArcanaWatch/ArcanaWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        TARGETED_DEVICE_FAMILY: "4"
        SUPPORTS_WATCH_COMPANION: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: ArcanaWatch/ArcanaWatch.entitlements

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Longitude — Watch Face Preview</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  canvas { border-radius:55px; box-shadow:0 0 40px rgba(0,0,0,0.8); }
</style>
</head>
<body>
<canvas id="w" width="396" height="484"></canvas>
<script>
// Inspired by A. Lange & Söhne: cream dial, off-center hours/minutes, outsize date, small seconds
const c=document.getElementById('w');
const ctx=c.getContext('2d');
const W=396,H=484,CX=W/2,CY=H/2;

function clip(){ctx.save();ctx.beginPath();ctx.roundRect(0,0,W,H,55);ctx.clip();}

function drawBG(){
  // Case
  const cg=ctx.createLinearGradient(0,0,W,H);
  cg.addColorStop(0,'#d4af37'); cg.addColorStop(0.5,'#b8960c'); cg.addColorStop(1,'#d4af37');
  ctx.beginPath(); ctx.arc(CX,CY,192,0,Math.PI*2);
  ctx.fillStyle=cg; ctx.fill();
  // Inner ring
  ctx.beginPath(); ctx.arc(CX,CY,183,0,Math.PI*2);
  ctx.fillStyle='#0a0a0a'; ctx.fill();
}

function drawDial(){
  // Cream silvered dial
  const g=ctx.createRadialGradient(CX-20,CY-30,10,CX,CY,180);
  g.addColorStop(0,'#f5f0e0'); g.addColorStop(0.7,'#ede8d5'); g.addColorStop(1,'#ddd8c0');
  ctx.beginPath(); ctx.arc(CX,CY,180,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='#c8b870'; ctx.lineWidth=2; ctx.stroke();
}

function drawOutsizeDate(day){
  // Large date window top-right — signature Lange feature
  const x=CX+52,y=CY-70,w=64,h=38;
  // Two windows
  ctx.fillStyle='#f8f5ea'; ctx.fillRect(x-w/2,y-h/2,w/2-1,h);
  ctx.fillStyle='#f8f5ea'; ctx.fillRect(x,y-h/2,w/2,h);
  ctx.strokeStyle='#9a8040'; ctx.lineWidth=1.5;
  ctx.strokeRect(x-w/2,y-h/2,w-1,h);
  ctx.strokeRect(x-w/2,y-h/2,w/2-1,h);
  // Numbers
  const tens=Math.floor(day/10),ones=day%10;
  ctx.fillStyle='#1a1a1a';
  ctx.font=`bold ${W*0.075}px Georgia`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(String(tens),x-w/4,y+1);
  ctx.fillText(String(ones),x+w/4,y+1);
}

function drawMainDial(){
  // Off-center hours/minutes dial — slightly up and left
  const ocx=CX-18,ocy=CY-15,R=120;
  // Dial circle
  ctx.beginPath(); ctx.arc(ocx,ocy,R,0,Math.PI*2);
  ctx.strokeStyle='#9a8040'; ctx.lineWidth=1.5; ctx.stroke();

  // Indices
  for(let i=0;i<12;i++){
    const a=(i*30-90)*Math.PI/180;
    const r1=R-2, r2=R-14;
    const x1=ocx+Math.cos(a)*r1,y1=ocy+Math.sin(a)*r1;
    const x2=ocx+Math.cos(a)*r2,y2=ocy+Math.sin(a)*r2;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle='#5a4010'; ctx.lineWidth=i%3===0?3:1.5; ctx.lineCap='round'; ctx.stroke();
  }
  for(let i=0;i<60;i++){
    if(i%5===0) continue;
    const a=(i*6-90)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(ocx+Math.cos(a)*(R-2),ocy+Math.sin(a)*(R-2));
    ctx.lineTo(ocx+Math.cos(a)*(R-7),ocy+Math.sin(a)*(R-7));
    ctx.strokeStyle='rgba(90,64,16,0.4)'; ctx.lineWidth=0.8; ctx.stroke();
  }
  // Numerals
  ctx.fillStyle='#2a1a00'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`${W*0.048}px Georgia`;
  const nrs=[{t:'12',h:12},{t:'3',h:3},{t:'6',h:6},{t:'9',h:9}];
  for(const n of nrs){
    const a=(n.h*30-90)*Math.PI/180;
    ctx.fillText(n.t,ocx+Math.cos(a)*(R-28),ocy+Math.sin(a)*(R-28));
  }
  return {cx:ocx,cy:ocy,r:R};
}

function drawSmallSeconds(cx,cy,s){
  // Small seconds at bottom right
  const scx=CX+68,scy=CY+72,r=35;
  ctx.beginPath(); ctx.arc(scx,scy,r,0,Math.PI*2);
  ctx.strokeStyle='#9a8040'; ctx.lineWidth=1.2; ctx.stroke();
  // Ticks
  for(let i=0;i<60;i++){
    const a=(i*6-90)*Math.PI/180;
    const r1=r-1, r2=i%5===0?r-8:r-4;
    ctx.beginPath();
    ctx.moveTo(scx+Math.cos(a)*r1,scy+Math.sin(a)*r1);
    ctx.lineTo(scx+Math.cos(a)*r2,scy+Math.sin(a)*r2);
    ctx.strokeStyle='rgba(90,64,16,0.5)'; ctx.lineWidth=0.8; ctx.stroke();
  }
  // Hand
  const a=(s*6-90)*Math.PI/180;
  ctx.beginPath();
  ctx.moveTo(scx-Math.cos(a)*(r*0.25),scy-Math.sin(a)*(r*0.25));
  ctx.lineTo(scx+Math.cos(a)*(r*0.8),scy+Math.sin(a)*(r*0.8));
  ctx.strokeStyle='#3a2000'; ctx.lineWidth=1.2; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(scx,scy,3,0,Math.PI*2);
  ctx.fillStyle='#3a2000'; ctx.fill();
}

function drawHand(ocx,ocy,angle,len,w,color){
  ctx.save(); ctx.translate(ocx,ocy); ctx.rotate(angle);
  const g=ctx.createLinearGradient(-w/2,0,w/2,0);
  g.addColorStop(0,'#9a8040'); g.addColorStop(0.5,color); g.addColorStop(1,'#9a8040');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(-w/2,10); ctx.lineTo(-w/2,0);
  ctx.lineTo(-w/6,-len*0.6); ctx.lineTo(0,-len);
  ctx.lineTo(w/6,-len*0.6); ctx.lineTo(w/2,0);
  ctx.lineTo(w/2,10); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.restore();
}

function drawBrand(){
  ctx.fillStyle='rgba(90,64,16,0.7)';
  ctx.font=`${W*0.042}px Georgia`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('LONGITUDE',CX,CY+135);
  ctx.font=`${W*0.022}px Georgia`;
  ctx.fillStyle='rgba(90,64,16,0.5)';
  ctx.fillText('GERMAN PRECISION',CX,CY+152);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  clip();
  const now=new Date();
  const h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds(),ms=now.getMilliseconds();

  drawBG(); drawDial();
  drawOutsizeDate(now.getDate());
  const {cx,cy}=drawMainDial();
  drawSmallSeconds(cx,cy,s+ms/1000);
  drawBrand();

  const ha=((h+m/60)*30-90)*Math.PI/180;
  const ma=((m+s/60)*6-90)*Math.PI/180;

  ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=5; ctx.shadowOffsetY=1;
  drawHand(cx,cy,ha,88,12,'#e8d890');
  drawHand(cx,cy,ma,112,9,'#e8d890');
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;

  const g=ctx.createRadialGradient(cx-1,cy-1,0,cx,cy,6);
  g.addColorStop(0,'#f0d870'); g.addColorStop(1,'#8a7030');
  ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();

  ctx.restore();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
